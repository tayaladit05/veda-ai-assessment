version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: veda_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - veda_network

  redis:
    image: redis:alpine
    container_name: veda_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - veda_network

volumes:
  mongodb_data:
  redis_data:

networks:
  veda_network:
    driver: bridge
